[files]
extend-exclude = [
    "*.json",
    "*.js",
    "*.ipynb",
    "uv.lock",
    "docs/pnpm-lock.yaml",
    "docs/.source/",
    "docs/node_modules/",
]

[default.extend-identifiers]
HashiCorp = "HashiCorp"

[default.extend-words]
# Don't correct the surname "Teh"
aks = "aks"
# FumaDocs / Next.js / React terms
fumadocs = "fumadocs"
mdx = "mdx"
tsx = "tsx"
mjs = "mjs"
unoptimized = "unoptimized"
prerendered = "prerendered"
# Kitaru product terms
kitaru = "kitaru"
fumapy = "fumapy"
griffe = "griffe"
# British spelling in the actual workflow filename (image-optimiser.yml)
optimiser = "optimiser"

[default]
locale = "en-us"
