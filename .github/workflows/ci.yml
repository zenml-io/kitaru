---
name: CI
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
env:
  ZENML_ANALYTICS_OPT_IN: false
  ZENML_LOGGING_VERBOSITY: INFO
  ZENML_MCP_ANALYTICS_DEV: true
  AUTO_OPEN_DASHBOARD: false
  ZENML_ENABLE_RICH_TRACEBACK: false
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run yamlfix --check .github/
  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen
      - run: uv run ty check
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --root-dir . --verbose --no-progress './**/*.md'
          fail: true
          jobSummary: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: py311-base
            python-version: '3.11'
            sync-command: uv sync --frozen
            pytest-command: uv run pytest --ignore=tests/mcp
          - name: py312-base
            python-version: '3.12'
            sync-command: uv sync --frozen
            pytest-command: uv run pytest --ignore=tests/mcp
          - name: py313-base
            python-version: '3.13'
            sync-command: uv sync --frozen
            pytest-command: uv run pytest --ignore=tests/mcp
          - name: py311-mcp
            python-version: '3.11'
            sync-command: uv sync --frozen --extra mcp
            pytest-command: uv run pytest tests/mcp
          - name: py312-mcp
            python-version: '3.12'
            sync-command: uv sync --frozen --extra mcp
            pytest-command: uv run pytest tests/mcp
    name: test (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: ${{ matrix.sync-command }}
      - run: ${{ matrix.pytest-command }}
