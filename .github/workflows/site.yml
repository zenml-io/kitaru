---
name: Site
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
    paths:
      - site/**
      - docs/**
      - scripts/generate_*.py
      - scripts/merge_site.sh
      - CHANGELOG.md
      - wrangler.toml
      - .github/workflows/site.yml
  pull_request_target:
    types: [closed]
permissions:
  contents: read
  pull-requests: write
concurrency:
  group: site-${{ github.event_name == 'pull_request' && github.event.pull_request.number
    || github.ref }}
  cancel-in-progress: true
jobs:
  build-deploy:
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    env:
      HAS_CF_SECRETS: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      # --- Generate docs content (Python-only generators) ---
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
      - run: uv sync --frozen
      - run: uv run python scripts/generate_cli_docs.py
      - run: uv run python scripts/generate_changelog_docs.py

      # --- Build docs (Node) ---
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288  # v5
        with:
          version: latest
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version-file: docs/.node-version
          cache: pnpm
          cache-dependency-path: |
            docs/pnpm-lock.yaml
            site/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: docs

      # --- Generate SDK reference (needs both Python griffe + Node fumadocs-python) ---
      - run: uv pip install ./docs/node_modules/fumadocs-python
      - run: uv run python scripts/generate_sdk_docs.py
      - run: node scripts/convert-sdk-docs.mjs
        working-directory: docs
      - run: pnpm run build
        working-directory: docs

      # --- Build site (Astro) ---
      - run: pnpm install --frozen-lockfile
        working-directory: site
      - run: pnpm run build
        working-directory: site

      # --- Merge docs into site ---
      - run: bash scripts/merge_site.sh

      # --- Check internal links in built output ---
      - name: Check internal links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2
        with:
          args: --offline --root-dir site/dist --no-progress --verbose --index-files
            index.html 'site/dist/**/*.html'
          fail: true
          jobSummary: true

      # --- Deploy unified Worker (production) ---
      - name: Deploy production
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name
          == 'workflow_dispatch'
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65  # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: deploy

      # --- Deploy preview Worker (same-repo PRs only; skip when secrets
      #     are unavailable, e.g. Dependabot PRs) ---
      - name: Deploy preview
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name
          == github.repository && env.HAS_CF_SECRETS == 'true'
        id: preview
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65  # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: deploy --name kitaru-site-preview-${{ github.event.pull_request.number }}

      # --- Sticky PR comment with preview URL ---
      - name: Comment preview URL
        if: steps.preview.outcome == 'success'
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987  # v3
        with:
          header: site-preview
          message: |
            ## Site Preview
            | | |
            |---|---|
            | **Preview URL** | https://kitaru-site-preview-${{ github.event.pull_request.number }}.zenml-migration.workers.dev |
            | **Branch** | `${{ github.head_ref }}` |
            | **Commit** | `${{ github.sha }}` |

  # --- Clean up preview Worker when PR closes ---
  cleanup-preview:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview Worker
        continue-on-error: true
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65  # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: delete --name kitaru-site-preview-${{ github.event.pull_request.number }}
            --force
