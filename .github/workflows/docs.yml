---
name: Docs
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
    paths:
      - docs/**
      - scripts/generate_*.py
      - src/kitaru/**
      - CHANGELOG.md
      - .github/workflows/docs.yml
permissions:
  contents: read
  pull-requests: write
concurrency:
  group: docs-${{ github.event_name == 'pull_request' && github.event.pull_request.number
    || github.ref }}
  cancel-in-progress: true
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Generate docs content (Python) ---
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run python scripts/generate_cli_docs.py
      - run: uv run python scripts/generate_changelog_docs.py

      # --- Build docs site (Node) ---
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version-file: docs/.node-version
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: docs
      - run: pnpm run build
        working-directory: docs

      # --- Deploy to Cloudflare Pages (production) ---
      - name: Deploy production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/out --project-name=kitaru-docs --branch=main

      # --- Deploy preview (same-repo PRs only) ---
      - name: Deploy preview
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name
          == github.repository
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/out --project-name=kitaru-docs --branch=pr-${{
            github.event.pull_request.number }}

      # --- Sticky PR comment with preview URL ---
      - name: Comment preview URL
        if: steps.preview.outcome == 'success'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docs-preview
          message: |-
            **Docs preview:** https://pr-${{ github.event.pull_request.number }}.kitaru-docs.pages.dev
