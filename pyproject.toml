[project]
name = "kitaru"
version = "0.1.0"
description = "Durable execution for AI agents, built on ZenML"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [
    { name = "ZenML GmbH", email = "info@zenml.io" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "pydantic>=2.0",
    "zenml>=0.94.0"
]

[project.urls]
Homepage = "https://kitaru.ai"
Repository = "https://github.com/zenml-io/kitaru"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kitaru"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.11",
    "ty>=0.0.1a7",
    "yamlfix",
    "pytest-randomly",
    "pytest-clarity",
]

[tool.ruff]
target-version = "py312"
src = ["src", "test"]
line-length = 88
exclude= [
    ".git",
    ".ruff_cache",
    ".venv"
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade (enforces modern type annotations)
    "B",    # bugbear
    "SIM",  # simplify
    "RUF",  # ruff-specific rules
]

[tool.ruff.lint.pydocstyle]
# Use Google-style docstrings.
convention = "google"

[tool.ruff.lint.isort]
known-first-party = ["kitaru"]

[tool.ty.environment]
python-version = "3.12"
root = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
